CONFIG_ZMK_USB_LOGGING=n
# External-power P-FET (P0.13). Default ON at boot; if persistent state is OFF
# (e.g. accidentally toggled off and saved), use the &ext_power EP_ON key
# binding on EXTRA layer to re-enable and persist.
CONFIG_ZMK_EXT_POWER=y
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=y
CONFIG_ZMK_PM_SOFT_OFF=y

# Secure Connections BLE pairing with 6-digit passkey entry.
# On pairing the host shows a PIN; you type it on the keyboard and hit Enter.
# This fixes Android's "PIN incorrect" refusal by forcing an authenticated flow
# and allows overwriting old stale bonds.
CONFIG_ZMK_BLE_PASSKEY_ENTRY=y
CONFIG_BT_SMP_ALLOW_UNAUTH_OVERWRITE=y

# LED indicator widget (BlueDrink9/zmk-poor-mans-led-indicator).
# Blinks the user LED on BT profile switch so the monochrome LED
# still conveys which profile is active (1 = Linux, 2 = Mac, 3 = Android...).
CONFIG_INDICATOR_LED_WIDGET=y
CONFIG_INDICATOR_LED_SHOW_BLE=y
CONFIG_INDICATOR_LED_SHOW_BATTERY_ON_BOOT=y

# OLED display (128x32 SSD1306 on I2C0, P1.01/P1.02)
CONFIG_ZMK_DISPLAY=y
CONFIG_I2C=y
CONFIG_SSD1306=y
CONFIG_ZMK_WIDGET_LAYER_STATUS=y
CONFIG_ZMK_WIDGET_BATTERY_STATUS=y
CONFIG_ZMK_WIDGET_OUTPUT_STATUS=y
# Display stays blanked by default; wakes only while EXTRA layer is active,
# then stays visible for 30s after leaving the layer. Handled by the custom
# display_on_layer module below.
CONFIG_ZMK_DISPLAY_BLANK_ON_IDLE=n
CONFIG_CHEAPINO_DISPLAY_ON_LAYER=y
CONFIG_CHEAPINO_DISPLAY_ON_LAYER_NUM=7
CONFIG_CHEAPINO_DISPLAY_OFF_DELAY_MS=30000
